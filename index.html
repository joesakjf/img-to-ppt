<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Image → PPT Maker</title>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container { max-width: 860px; margin: 0 auto; }

    h1 { font-size: 28px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.5px; }
    .subtitle { color: #888; font-size: 14px; margin-bottom: 32px; }

    #dropzone {
      border: 2px dashed #333;
      border-radius: 16px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: #1a1a1a;
      margin-bottom: 32px;
    }
    #dropzone.drag-over { border-color: #6c63ff; background: #1e1a2e; }
    #dropzone .icon { font-size: 48px; margin-bottom: 12px; }
    #dropzone p { font-size: 16px; color: #aaa; margin-bottom: 8px; }
    #dropzone span { font-size: 13px; color: #555; }
    #fileInput { display: none; }

    .browse-btn {
      display: inline-block;
      margin-top: 14px;
      padding: 10px 24px;
      background: #6c63ff;
      color: #fff;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background 0.2s;
    }
    .browse-btn:hover { background: #5a52e0; }

    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .count-badge { font-size: 13px; color: #888; flex: 1; }
    .count-badge strong { color: #fff; }

    .ctrl-btn {
      padding: 8px 16px;
      background: #2a2a2a;
      color: #ccc;
      border: 1px solid #333;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .ctrl-btn:hover { background: #333; }

    .options {
      display: flex;
      align-items: flex-end;
      gap: 20px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .option-group { display: flex; flex-direction: column; gap: 4px; }
    .option-group label { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
    .option-group select,
    .option-group input[type="text"] {
      background: #1a1a1a;
      border: 1px solid #333;
      color: #f0f0f0;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }
    .option-group select:focus,
    .option-group input:focus { border-color: #6c63ff; }

    #preview {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 32px;
    }

    .thumb {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      background: #1a1a1a;
      padding-bottom: 56.25%;
      height: 0;
      cursor: grab;
      border: 2px solid transparent;
      transition: border-color 0.2s, transform 0.15s, opacity 0.15s;
      user-select: none;
    }
    .thumb:hover { border-color: #6c63ff; }
    .thumb.dragging { opacity: 0.35; transform: scale(0.95); }
    .thumb.drag-target { border-color: #6c63ff; transform: scale(1.04); }

    .thumb img {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }

    .thumb .num {
      position: absolute;
      bottom: 6px;
      left: 6px;
      background: rgba(0,0,0,0.65);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 20px;
      pointer-events: none;
    }

    .thumb .remove {
      position: absolute;
      top: 5px;
      right: 5px;
      width: 22px;
      height: 22px;
      background: rgba(0,0,0,0.7);
      color: #fff;
      border: none;
      border-radius: 50%;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .thumb:hover .remove { opacity: 1; }

    #generateBtn {
      display: block;
      width: 100%;
      padding: 16px;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      letter-spacing: 0.2px;
    }
    #generateBtn:hover { background: #5a52e0; }
    #generateBtn:disabled { opacity: 0.4; cursor: not-allowed; }

    #progressWrap { display: none; margin-top: 16px; }
    #progressBar { height: 6px; background: #222; border-radius: 99px; overflow: hidden; margin-bottom: 8px; }
    #progressFill { height: 100%; background: #6c63ff; border-radius: 99px; transition: width 0.2s; width: 0%; }
    #progressLabel { font-size: 13px; color: #888; text-align: center; }

    .empty-state { text-align: center; color: #444; font-size: 14px; padding: 20px 0; }
  </style>
</head>
<body>
<div class="container">
  <h1>🖼️ Image → PPT Maker</h1>
  <p class="subtitle">Upload images — each one becomes a full-slide background in your presentation.</p>

  <div id="dropzone">
    <div class="icon">📂</div>
    <p>Drag & drop images here</p>
    <span>PNG, JPG, GIF, WEBP supported</span><br/>
    <button class="browse-btn" onclick="document.getElementById('fileInput').click()">Browse Files</button>
    <input type="file" id="fileInput" multiple accept="image/*"/>
  </div>

  <div class="options" id="optionsRow" style="display:none">
    <div class="option-group">
      <label>Slide Size</label>
      <select id="layoutSelect">
        <option value="16x9">16:9 (Standard)</option>
        <option value="16x10">16:10</option>
        <option value="4x3">4:3 (Classic)</option>
        <option value="wide">Wide (13.3")</option>
      </select>
    </div>
    <div class="option-group">
      <label>File Name</label>
      <input type="text" id="fileName" value="presentation" placeholder="presentation"/>
    </div>
  </div>

  <div class="controls" id="controlsRow" style="display:none">
    <div class="count-badge"><strong id="imgCount">0</strong> images &nbsp;·&nbsp; drag to reorder</div>
    <button class="ctrl-btn" onclick="sortByName()">Sort A → Z</button>
    <button class="ctrl-btn" onclick="clearAll()">Clear All</button>
    <button class="ctrl-btn" onclick="document.getElementById('fileInput').click()">+ Add More</button>
  </div>

  <div id="preview"><div class="empty-state">No images yet</div></div>

  <button id="generateBtn" onclick="generate()" disabled>Generate Presentation</button>

  <div id="progressWrap">
    <div id="progressBar"><div id="progressFill"></div></div>
    <div id="progressLabel">Preparing...</div>
  </div>
</div>

  // Layout dimensions in EMUs (1 inch = 914400 EMUs)
  const LAYOUTS = {
    '16x9':  { cx: 9144000, cy: 5143500 },
    '16x10': { cx: 9144000, cy: 5715000 },
    '4x3':   { cx: 9144000, cy: 6858000 },
    'wide':  { cx: 12192000, cy: 6858000 },
  };

  let files = [];
  let dragSrcIdx = null;

  // ---- Drop Zone ----
  const dropzone = document.getElementById('dropzone');
  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
  dropzone.addEventListener('drop', e => {
    e.preventDefault();
    dropzone.classList.remove('drag-over');
    ingestFiles(e.dataTransfer.files);
  });
  dropzone.addEventListener('click', e => {
    if (e.target.tagName !== 'BUTTON') document.getElementById('fileInput').click();
  });
  document.getElementById('fileInput').addEventListener('change', e => {
    ingestFiles(e.target.files);
    e.target.value = '';
  });

  // Read files sequentially to avoid memory issues with large batches
  async function ingestFiles(rawFiles) {
    const imageFiles = Array.from(rawFiles).filter(f => f.type.startsWith('image/'));
    for (const f of imageFiles) {
      const dataUrl = await readAsDataURL(f);
      files.push({ name: f.name, dataUrl, mimeType: f.type });
    }
    renderPreview();
  }

  function readAsDataURL(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function renderPreview() {
    const grid = document.getElementById('preview');
    const count = files.length;

    document.getElementById('imgCount').textContent = count;
    document.getElementById('generateBtn').disabled = count === 0;
    document.getElementById('controlsRow').style.display = count ? 'flex' : 'none';
    document.getElementById('optionsRow').style.display = count ? 'flex' : 'none';

    if (count === 0) {
      grid.innerHTML = '<div class="empty-state">No images yet</div>';
      return;
    }

    grid.innerHTML = '';
    files.forEach((item, i) => {
      const div = document.createElement('div');
      div.className = 'thumb';
      div.draggable = true;

      const img = document.createElement('img');
      img.src = item.dataUrl;
      img.alt = item.name;

      const num = document.createElement('div');
      num.className = 'num';
      num.textContent = i + 1;

      const rmBtn = document.createElement('button');
      rmBtn.className = 'remove';
      rmBtn.title = 'Remove';
      rmBtn.textContent = '✕';
      rmBtn.addEventListener('click', e => {
        e.stopPropagation();
        files.splice(i, 1);
        renderPreview();
      });

      div.appendChild(img);
      div.appendChild(num);
      div.appendChild(rmBtn);

      div.addEventListener('dragstart', e => {
        dragSrcIdx = i;
        e.dataTransfer.effectAllowed = 'move';
        setTimeout(() => div.classList.add('dragging'), 0);
      });
      div.addEventListener('dragend', () => {
        div.classList.remove('dragging');
        document.querySelectorAll('.thumb').forEach(t => t.classList.remove('drag-target'));
      });
      div.addEventListener('dragover', e => {
        e.preventDefault();
        if (dragSrcIdx !== i) div.classList.add('drag-target');
      });
      div.addEventListener('dragleave', () => div.classList.remove('drag-target'));
      div.addEventListener('drop', e => {
        e.preventDefault();
        div.classList.remove('drag-target');
        if (dragSrcIdx === null || dragSrcIdx === i) return;
        const moved = files.splice(dragSrcIdx, 1)[0];
        files.splice(i, 0, moved);
        dragSrcIdx = null;
        renderPreview();
      });

      grid.appendChild(div);
    });
  }

  function clearAll() { files = []; renderPreview(); }

  function sortByName() {
    files.sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: 'base' }));
    renderPreview();
  }

  // ---- PPTX Generation ----

  function b64ToBytes(b64) {
    const bin = atob(b64);
    const out = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
    return out;
  }

  function dataUrlToBytes(dataUrl) {
    return b64ToBytes(dataUrl.split(',')[1]);
  }

  function mimeToExt(mimeType) {
    const map = { 'image/jpeg': 'jpg', 'image/png': 'png', 'image/gif': 'gif', 'image/webp': 'webp' };
    return map[mimeType] || 'jpg';
  }

  function makeSlideXml(num, ext, cx, cy) {
    return `<?xml version='1.0' encoding='UTF-8' standalone='yes'?>
<p:sld xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main" xmlns:p="http://schemas.openxmlformats.org/presentationml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><p:cSld><p:spTree><p:nvGrpSpPr><p:cNvPr id="1" name=""/><p:cNvGrpSpPr/><p:nvPr/></p:nvGrpSpPr><p:grpSpPr/><p:pic><p:nvPicPr><p:cNvPr id="2" name="Picture ${num}" descr="image${num}.${ext}"/><p:cNvPicPr><a:picLocks noChangeAspect="1"/></p:cNvPicPr><p:nvPr/></p:nvPicPr><p:blipFill><a:blip r:embed="rId2"/><a:stretch><a:fillRect/></a:stretch></p:blipFill><p:spPr><a:xfrm><a:off x="0" y="0"/><a:ext cx="${cx}" cy="${cy}"/></a:xfrm><a:prstGeom prst="rect"><a:avLst/></a:prstGeom></p:spPr></p:pic></p:spTree></p:cSld><p:clrMapOvr><a:masterClrMapping/></p:clrMapOvr></p:sld>`;
  }

  function makeSlideRels(num, ext) {
    return `<?xml version='1.0' encoding='UTF-8' standalone='yes'?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/slideLayout" Target="../slideLayouts/slideLayout7.xml"/><Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/image" Target="../media/image${num}.${ext}"/></Relationships>`;
  }

  async function generate() {
    if (!files.length) return;

    const btn = document.getElementById('generateBtn');
    const wrap = document.getElementById('progressWrap');
    const fill = document.getElementById('progressFill');
    const label = document.getElementById('progressLabel');

    btn.disabled = true;
    wrap.style.display = 'block';
    fill.style.background = '#6c63ff';
    fill.style.width = '0%';

    try {
      const layoutKey = document.getElementById('layoutSelect').value;
      const { cx, cy } = LAYOUTS[layoutKey];
      const rawName = document.getElementById('fileName').value.trim() || 'presentation';
      const fileName = rawName.replace(/\.pptx$/i, '') + '.pptx';

      label.textContent = 'Loading template...';
      await tick();

      // Load the template PPTX
      const templateBytes = b64ToBytes(TEMPLATE_B64);
      const zip = await JSZip.loadAsync(templateBytes);

      // Track what ext types we're adding (for Content_Types)
      const usedExts = new Set();

      // The template's presentation.xml.rels has rId1-rId6
      // Slides will start at rId7
      const BASE_RID = 7;
      let newPresRels = '';
      let newSldIdLst = '';
      let newContentTypeOverrides = '';

      for (let i = 0; i < files.length; i++) {
        const num = i + 1;
        const rIdNum = BASE_RID + i;
        const ext = mimeToExt(files[i].mimeType);
        usedExts.add(ext);

        fill.style.width = (Math.round((i / files.length) * 80)) + '%';
        label.textContent = `Adding slide ${num} of ${files.length}...`;
        await tick();

        // Add image binary
        const imgBytes = dataUrlToBytes(files[i].dataUrl);
        zip.file(`ppt/media/image${num}.${ext}`, imgBytes);

        // Add slide XML
        zip.file(`ppt/slides/slide${num}.xml`, makeSlideXml(num, ext, cx, cy));

        // Add slide rels
        zip.file(`ppt/slides/_rels/slide${num}.xml.rels`, makeSlideRels(num, ext));

        newPresRels += `<Relationship Id="rId${rIdNum}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/slide" Target="slides/slide${num}.xml"/>`;
        newSldIdLst += `<p:sldId id="${255 + num}" r:id="rId${rIdNum}"/>`;
        newContentTypeOverrides += `<Override PartName="/ppt/slides/slide${num}.xml" ContentType="application/vnd.openxmlformats-officedocument.presentationml.slide+xml"/>`;
      }

      label.textContent = 'Updating presentation structure...';
      fill.style.width = '85%';
      await tick();

      // Update presentation.xml.rels — append slide relationships
      let presRels = await zip.file('ppt/_rels/presentation.xml.rels').async('string');
      presRels = presRels.replace('</Relationships>', newPresRels + '</Relationships>');
      zip.file('ppt/_rels/presentation.xml.rels', presRels);

      // Update presentation.xml — insert sldIdLst and fix sldSz
      let presXml = await zip.file('ppt/presentation.xml').async('string');
      // Insert sldIdLst before <p:sldSz
      presXml = presXml.replace('<p:sldSz', `<p:sldIdLst>${newSldIdLst}</p:sldIdLst><p:sldSz`);
      // Fix slide size dimensions
      presXml = presXml.replace(/(<p:sldSz)[^/]*(\/>)/, `<p:sldSz cx="${cx}" cy="${cy}"/>`);
      zip.file('ppt/presentation.xml', presXml);

      // Update [Content_Types].xml — add slide overrides + any missing image extensions
      let ct = await zip.file('[Content_Types].xml').async('string');
      // Add missing image extensions
      let extraDefaults = '';
      if (usedExts.has('jpg') && !ct.includes('Extension="jpg"')) {
        extraDefaults += '<Default Extension="jpg" ContentType="image/jpeg"/>';
      }
      if (usedExts.has('png') && !ct.includes('Extension="png"')) {
        extraDefaults += '<Default Extension="png" ContentType="image/png"/>';
      }
      if (usedExts.has('gif') && !ct.includes('Extension="gif"')) {
        extraDefaults += '<Default Extension="gif" ContentType="image/gif"/>';
      }
      if (usedExts.has('webp') && !ct.includes('Extension="webp"')) {
        extraDefaults += '<Default Extension="webp" ContentType="image/webp"/>';
      }
      ct = ct.replace('</Types>', extraDefaults + newContentTypeOverrides + '</Types>');
      zip.file('[Content_Types].xml', ct);

      label.textContent = 'Saving file...';
      fill.style.width = '95%';
      await tick();

      // Generate the blob
      const blob = await zip.generateAsync({
        type: 'blob',
        mimeType: 'application/vnd.openxmlformats-officedocument.presentationml.presentation',
        compression: 'DEFLATE',
        compressionOptions: { level: 6 }
      });

      // Trigger download
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = fileName;
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 10000);

      fill.style.width = '100%';
      fill.style.background = '#22c55e';
      label.textContent = `✅ "${fileName}" downloaded!`;

    } catch (err) {
      fill.style.background = '#ef4444';
      label.textContent = '❌ Error: ' + err.message;
      console.error(err);
    }

    btn.disabled = false;

    setTimeout(() => {
      wrap.style.display = 'none';
      fill.style.width = '0%';
      fill.style.background = '#6c63ff';
    }, 5000);
  }

  function tick() {
    return new Promise(r => setTimeout(r, 0));
  }
</script>
</body>
</html>
