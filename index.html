<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Image → PPT Maker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f; color: #f0f0f0;
      min-height: 100vh; padding: 40px 20px;
    }
    .container { max-width: 860px; margin: 0 auto; }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.5px; }
    .subtitle { color: #888; font-size: 14px; margin-bottom: 32px; }

    #dropzone {
      border: 2px dashed #333; border-radius: 16px; padding: 48px 24px;
      text-align: center; cursor: pointer; background: #1a1a1a;
      transition: border-color .2s, background .2s; margin-bottom: 32px;
    }
    #dropzone.drag-over { border-color: #6c63ff; background: #1e1a2e; }
    #dropzone .icon { font-size: 48px; margin-bottom: 12px; }
    #dropzone p { font-size: 16px; color: #aaa; margin-bottom: 8px; }
    #dropzone span { font-size: 13px; color: #555; }
    #fileInput { display: none; }

    .browse-btn {
      display: inline-block; margin-top: 14px; padding: 10px 24px;
      background: #6c63ff; color: #fff; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer; border: none;
      transition: background .2s;
    }
    .browse-btn:hover { background: #5a52e0; }

    .options {
      display: flex; align-items: flex-end; gap: 20px;
      margin-bottom: 24px; flex-wrap: wrap;
    }
    .option-group { display: flex; flex-direction: column; gap: 4px; }
    .option-group label { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: .5px; }
    .option-group select, .option-group input[type="text"] {
      background: #1a1a1a; border: 1px solid #333; color: #f0f0f0;
      padding: 8px 12px; border-radius: 8px; font-size: 14px; outline: none;
    }
    .option-group select:focus, .option-group input:focus { border-color: #6c63ff; }

    .controls {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 20px; flex-wrap: wrap;
    }
    .count-badge { font-size: 13px; color: #888; flex: 1; }
    .count-badge strong { color: #fff; }
    .ctrl-btn {
      padding: 8px 16px; background: #2a2a2a; color: #ccc;
      border: 1px solid #333; border-radius: 8px; font-size: 13px;
      cursor: pointer; transition: background .2s;
    }
    .ctrl-btn:hover { background: #333; }

    #preview {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px; margin-bottom: 32px;
    }
    /* Padding-bottom aspect ratio trick — works in all browsers */
    .thumb {
      position: relative; border-radius: 10px; overflow: hidden;
      background: #1a1a1a; padding-bottom: 56.25%; height: 0;
      cursor: grab; border: 2px solid transparent;
      transition: border-color .2s, transform .15s, opacity .15s;
      user-select: none;
    }
    .thumb:hover { border-color: #6c63ff; }
    .thumb.dragging { opacity: .35; transform: scale(.95); }
    .thumb.drag-target { border-color: #6c63ff; transform: scale(1.04); }
    .thumb img {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      width: 100%; height: 100%; object-fit: cover;
      display: block; pointer-events: none;
    }
    .thumb .num {
      position: absolute; bottom: 6px; left: 6px;
      background: rgba(0,0,0,.65); color: #fff;
      font-size: 11px; font-weight: 700; padding: 2px 7px;
      border-radius: 20px; pointer-events: none;
    }
    .thumb .remove {
      position: absolute; top: 5px; right: 5px;
      width: 22px; height: 22px; background: rgba(0,0,0,.7);
      color: #fff; border: none; border-radius: 50%; font-size: 13px;
      cursor: pointer; display: flex; align-items: center;
      justify-content: center; opacity: 0; transition: opacity .15s;
    }
    .thumb:hover .remove { opacity: 1; }

    #generateBtn {
      display: block; width: 100%; padding: 16px;
      background: #6c63ff; color: #fff; border: none; border-radius: 12px;
      font-size: 16px; font-weight: 700; cursor: pointer;
      transition: background .2s, opacity .2s;
    }
    #generateBtn:hover { background: #5a52e0; }
    #generateBtn:disabled { opacity: .4; cursor: not-allowed; }

    #progressWrap { display: none; margin-top: 16px; }
    #progressBar { height: 6px; background: #222; border-radius: 99px; overflow: hidden; margin-bottom: 8px; }
    #progressFill { height: 100%; background: #6c63ff; border-radius: 99px; transition: width .2s; width: 0%; }
    #progressLabel { font-size: 13px; color: #888; text-align: center; }
    .empty-state { text-align: center; color: #444; font-size: 14px; padding: 20px 0; }
  </style>
</head>
<body>
<div class="container">
  <h1>🖼️ Image → PPT Maker</h1>
  <p class="subtitle">Upload images — each one becomes a full-slide background.</p>

  <div id="dropzone">
    <div class="icon">📂</div>
    <p>Drag & drop images here</p>
    <span>PNG, JPG, GIF, WEBP supported</span><br/>
    <button class="browse-btn" onclick="document.getElementById('fileInput').click()">Browse Files</button>
    <input type="file" id="fileInput" multiple accept="image/*"/>
  </div>

  <div class="options" id="optionsRow" style="display:none">
    <div class="option-group">
      <label>Slide Size</label>
      <select id="layoutSelect">
        <option value="16x9">16:9 (Standard)</option>
        <option value="16x10">16:10</option>
        <option value="4x3">4:3 (Classic)</option>
        <option value="wide">Wide (13.3")</option>
      </select>
    </div>
    <div class="option-group">
      <label>File Name</label>
      <input type="text" id="fileName" value="presentation" placeholder="presentation"/>
    </div>
  </div>

  <div class="controls" id="controlsRow" style="display:none">
    <div class="count-badge"><strong id="imgCount">0</strong> images &nbsp;·&nbsp; drag to reorder</div>
    <button class="ctrl-btn" onclick="sortByName()">Sort A → Z</button>
    <button class="ctrl-btn" onclick="clearAll()">Clear All</button>
    <button class="ctrl-btn" onclick="document.getElementById('fileInput').click()">+ Add More</button>
  </div>

  <div id="preview"><div class="empty-state">No images yet</div></div>

  <button id="generateBtn" onclick="generate()" disabled>Generate Presentation</button>
  <div id="progressWrap">
    <div id="progressBar"><div id="progressFill"></div></div>
    <div id="progressLabel"></div>
  </div>
</div>

<script>
  // Each entry: { name, type, dataUrl }
  let files = [];
  let dragSrcIdx = null;

  // ── Drop zone ──────────────────────────────────────
  const dropzone = document.getElementById('dropzone');
  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
  dropzone.addEventListener('drop', e => { e.preventDefault(); dropzone.classList.remove('drag-over'); ingestFiles(e.dataTransfer.files); });
  dropzone.addEventListener('click', e => { if (e.target.tagName !== 'BUTTON') document.getElementById('fileInput').click(); });
  document.getElementById('fileInput').addEventListener('change', e => { ingestFiles(e.target.files); e.target.value = ''; });

  function readAsDataURL(file) {
    return new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = () => resolve(r.result);
      r.onerror = reject;
      r.readAsDataURL(file);
    });
  }

  // Sequential read — avoids browser memory corruption on large batches
  async function ingestFiles(rawFiles) {
    const imgs = Array.from(rawFiles).filter(f => f.type.startsWith('image/'));
    if (!imgs.length) return;
    const grid = document.getElementById('preview');
    grid.innerHTML = `<div class="empty-state">Loading 0 / ${imgs.length}…</div>`;
    for (let i = 0; i < imgs.length; i++) {
      try {
        const dataUrl = await readAsDataURL(imgs[i]);
        files.push({ name: imgs[i].name, type: imgs[i].type, dataUrl });
        grid.innerHTML = `<div class="empty-state">Loading ${i + 1} / ${imgs.length}…</div>`;
      } catch(e) { console.error('read failed:', imgs[i].name, e); }
    }
    renderPreview();
  }

  function renderPreview() {
    const grid = document.getElementById('preview');
    const n = files.length;
    document.getElementById('imgCount').textContent = n;
    document.getElementById('generateBtn').disabled = n === 0;
    document.getElementById('controlsRow').style.display = n ? 'flex' : 'none';
    document.getElementById('optionsRow').style.display = n ? 'flex' : 'none';
    if (!n) { grid.innerHTML = '<div class="empty-state">No images yet</div>'; return; }
    grid.innerHTML = '';
    files.forEach((item, i) => {
      const div = document.createElement('div');
      div.className = 'thumb';
      div.draggable = true;
      const img = document.createElement('img');
      img.src = item.dataUrl;
      img.alt = item.name;
      const num = document.createElement('div');
      num.className = 'num';
      num.textContent = i + 1;
      const rm = document.createElement('button');
      rm.className = 'remove'; rm.title = 'Remove'; rm.textContent = '✕';
      rm.addEventListener('click', e => { e.stopPropagation(); files.splice(i, 1); renderPreview(); });
      div.appendChild(img); div.appendChild(num); div.appendChild(rm);
      div.addEventListener('dragstart', e => { dragSrcIdx = i; e.dataTransfer.effectAllowed = 'move'; setTimeout(() => div.classList.add('dragging'), 0); });
      div.addEventListener('dragend', () => { div.classList.remove('dragging'); document.querySelectorAll('.thumb').forEach(t => t.classList.remove('drag-target')); });
      div.addEventListener('dragover', e => { e.preventDefault(); if (dragSrcIdx !== i) div.classList.add('drag-target'); });
      div.addEventListener('dragleave', () => div.classList.remove('drag-target'));
      div.addEventListener('drop', e => {
        e.preventDefault(); div.classList.remove('drag-target');
        if (dragSrcIdx === null || dragSrcIdx === i) return;
        const moved = files.splice(dragSrcIdx, 1)[0];
        files.splice(i, 0, moved); dragSrcIdx = null; renderPreview();
      });
      grid.appendChild(div);
    });
  }

  function clearAll() { files = []; renderPreview(); }
  function sortByName() {
    files.sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: 'base' }));
    renderPreview();
  }

  // ── PPTX helpers ──────────────────────────────────
  const DIMS = {
    '16x9':  { cx: 9144000,  cy: 5143500,  type: 'screen16x9' },
    '16x10': { cx: 9144000,  cy: 5715000,  type: 'screen16x10' },
    '4x3':   { cx: 9144000,  cy: 6858000,  type: 'screen4x3' },
    'wide':  { cx: 12161520, cy: 6858000,  type: 'custom' },
  };

  function mimeExt(type) {
    return { 'image/jpeg': 'jpg', 'image/jpg': 'jpg', 'image/png': 'png', 'image/gif': 'gif', 'image/webp': 'webp' }[type] || 'jpg';
  }

  // Convert base64 dataUrl → Uint8Array (no extra FileReader needed)
  function dataUrlToBytes(dataUrl) {
    const b64 = dataUrl.split(',')[1];
    const bin = atob(b64);
    const out = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
    return out;
  }

  // ── Generate ──────────────────────────────────────
  async function generate() {
    if (!files.length) return;
    const btn = document.getElementById('generateBtn');
    const wrap = document.getElementById('progressWrap');
    const fill = document.getElementById('progressFill');
    const label = document.getElementById('progressLabel');

    btn.disabled = true;
    wrap.style.display = 'block';
    fill.style.background = '#6c63ff';
    fill.style.width = '0%';

    const layout = document.getElementById('layoutSelect').value;
    const rawName = document.getElementById('fileName').value.trim() || 'presentation';
    const fileName = rawName.replace(/\.pptx$/i, '') + '.pptx';
    const dim = DIMS[layout];
    const n = files.length;

    label.textContent = 'Building presentation…';

    const zip = new JSZip();

    // [Content_Types].xml
    let ct = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
  <Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
  <Default Extension="xml"  ContentType="application/xml"/>
  <Default Extension="jpg"  ContentType="image/jpeg"/>
  <Default Extension="jpeg" ContentType="image/jpeg"/>
  <Default Extension="png"  ContentType="image/png"/>
  <Default Extension="gif"  ContentType="image/gif"/>
  <Default Extension="webp" ContentType="image/webp"/>
  <Override PartName="/ppt/presentation.xml"                ContentType="application/vnd.openxmlformats-officedocument.presentationml.presentation.main+xml"/>
  <Override PartName="/ppt/slideMasters/slideMaster1.xml"   ContentType="application/vnd.openxmlformats-officedocument.presentationml.slideMaster+xml"/>
  <Override PartName="/ppt/slideLayouts/slideLayout1.xml"   ContentType="application/vnd.openxmlformats-officedocument.presentationml.slideLayout+xml"/>`;
    for (let i = 1; i <= n; i++) ct += `\n  <Override PartName="/ppt/slides/slide${i}.xml" ContentType="application/vnd.openxmlformats-officedocument.presentationml.slide+xml"/>`;
    ct += '\n</Types>';
    zip.file('[Content_Types].xml', ct);

    // _rels/.rels
    zip.file('_rels/.rels', `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="ppt/presentation.xml"/>
</Relationships>`);

    // ppt/presentation.xml + rels
    let sldIds = '', presRels = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/slideMaster" Target="slideMasters/slideMaster1.xml"/>`;
    for (let i = 1; i <= n; i++) {
      sldIds += `\n    <p:sldId id="${255 + i}" r:id="rId${i + 1}"/>`;
      presRels += `\n  <Relationship Id="rId${i + 1}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/slide" Target="slides/slide${i}.xml"/>`;
    }
    presRels += '\n</Relationships>';

    zip.file('ppt/presentation.xml', `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<p:presentation xmlns:p="http://schemas.openxmlformats.org/presentationml/2006/main"
                xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main"
                xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">
  <p:sldMasterIdLst><p:sldMasterId id="2147483648" r:id="rId1"/></p:sldMasterIdLst>
  <p:sldSz cx="${dim.cx}" cy="${dim.cy}" type="${dim.type}"/>
  <p:notesSz cx="6858000" cy="9144000"/>
  <p:sldIdLst>${sldIds}
  </p:sldIdLst>
</p:presentation>`);
    zip.file('ppt/_rels/presentation.xml.rels', presRels);

    // Slide Master
    zip.file('ppt/slideMasters/slideMaster1.xml', `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<p:sldMaster xmlns:p="http://schemas.openxmlformats.org/presentationml/2006/main"
             xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main"
             xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">
  <p:cSld><p:spTree>
    <p:nvGrpSpPr><p:cNvPr id="1" name=""/><p:cNvGrpSpPr/><p:nvPr/></p:nvGrpSpPr>
    <p:grpSpPr><a:xfrm><a:off x="0" y="0"/><a:ext cx="0" cy="0"/><a:chOff x="0" y="0"/><a:chExt cx="0" cy="0"/></a:xfrm></p:grpSpPr>
  </p:spTree></p:cSld>
  <p:clrMap bg1="lt1" tx1="dk1" bg2="lt2" tx2="dk2" accent1="accent1" accent2="accent2" accent3="accent3" accent4="accent4" accent5="accent5" accent6="accent6" hlink="hlink" folHlink="folHlink"/>
  <p:sldLayoutIdLst><p:sldLayoutId id="2147483649" r:id="rId1"/></p:sldLayoutIdLst>
  <p:txStyles>
    <p:titleStyle><a:lvl1pPr><a:defRPr lang="en-US" smtClean="0"/></a:lvl1pPr></p:titleStyle>
    <p:bodyStyle><a:lvl1pPr><a:defRPr lang="en-US" smtClean="0"/></a:lvl1pPr></p:bodyStyle>
    <p:otherStyle><a:lvl1pPr><a:defRPr lang="en-US" smtClean="0"/></a:lvl1pPr></p:otherStyle>
  </p:txStyles>
</p:sldMaster>`);
    zip.file('ppt/slideMasters/_rels/slideMaster1.xml.rels', `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/slideLayout" Target="../slideLayouts/slideLayout1.xml"/>
</Relationships>`);

    // Slide Layout
    zip.file('ppt/slideLayouts/slideLayout1.xml', `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<p:sldLayout xmlns:p="http://schemas.openxmlformats.org/presentationml/2006/main"
             xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main"
             xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"
             type="blank" preserve="1">
  <p:cSld name="Blank"><p:spTree>
    <p:nvGrpSpPr><p:cNvPr id="1" name=""/><p:cNvGrpSpPr/><p:nvPr/></p:nvGrpSpPr>
    <p:grpSpPr><a:xfrm><a:off x="0" y="0"/><a:ext cx="0" cy="0"/><a:chOff x="0" y="0"/><a:chExt cx="0" cy="0"/></a:xfrm></p:grpSpPr>
  </p:spTree></p:cSld>
  <p:clrMapOvr><a:masterClrMapping/></p:clrMapOvr>
</p:sldLayout>`);
    zip.file('ppt/slideLayouts/_rels/slideLayout1.xml.rels', `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/slideMaster" Target="../slideMasters/slideMaster1.xml"/>
</Relationships>`);

    // Slides + media — each slide gets its OWN uniquely named image file
    for (let i = 0; i < n; i++) {
      const item = files[i];
      const num = i + 1;
      const ext = mimeExt(item.type);
      const mediaName = `image${num}.${ext}`;

      // Store image bytes
      zip.file(`ppt/media/${mediaName}`, dataUrlToBytes(item.dataUrl));

      // Slide XML — background via blipFill
      zip.file(`ppt/slides/slide${num}.xml`, `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<p:sld xmlns:p="http://schemas.openxmlformats.org/presentationml/2006/main"
       xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main"
       xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">
  <p:cSld>
    <p:bg><p:bgPr>
      <a:blipFill><a:blip r:embed="rId1"/><a:stretch><a:fillRect/></a:stretch></a:blipFill>
      <a:effectLst/>
    </p:bgPr></p:bg>
    <p:spTree>
      <p:nvGrpSpPr><p:cNvPr id="1" name=""/><p:cNvGrpSpPr/><p:nvPr/></p:nvGrpSpPr>
      <p:grpSpPr><a:xfrm><a:off x="0" y="0"/><a:ext cx="0" cy="0"/><a:chOff x="0" y="0"/><a:chExt cx="0" cy="0"/></a:xfrm></p:grpSpPr>
    </p:spTree>
  </p:cSld>
</p:sld>`);

      // Slide rels — rId1 = image, rId2 = layout
      zip.file(`ppt/slides/_rels/slide${num}.xml.rels`, `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/image" Target="../media/${mediaName}"/>
  <Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/slideLayout" Target="../slideLayouts/slideLayout1.xml"/>
</Relationships>`);

      const pct = Math.round((num / n) * 90);
      fill.style.width = pct + '%';
      label.textContent = `Building slide ${num} of ${n}…`;
      await new Promise(r => setTimeout(r, 0)); // yield to UI
    }

    label.textContent = 'Packaging file…';
    fill.style.width = '95%';

    const blob = await zip.generateAsync({
      type: 'blob',
      mimeType: 'application/vnd.openxmlformats-officedocument.presentationml.presentation',
      compression: 'DEFLATE',
      compressionOptions: { level: 6 }
    });

    // Trigger download
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = fileName;
    a.click();
    URL.revokeObjectURL(url);

    fill.style.width = '100%';
    fill.style.background = '#22c55e';
    label.textContent = `✅ "${fileName}" downloaded!`;
    btn.disabled = false;

    setTimeout(() => {
      wrap.style.display = 'none';
      fill.style.width = '0%';
      fill.style.background = '#6c63ff';
    }, 4000);
  }
</script>
</body>
</html>
